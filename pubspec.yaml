name: pantheon_forge
description: "Pantheon Forge - AI Agent Collaboration Platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Database
  sqlite3: ^2.7.3
  sqlite3_flutter_libs: ^0.5.30

  # HTTP & networking
  dio: ^5.8.0+1

  # UI
  flutter_markdown: ^0.7.7
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  collection: ^1.19.1
  file_selector: ^1.0.3

  # Window management
  window_manager: ^0.4.3

  # Syntax highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # SSH
  dartssh2: ^2.11.0
  xterm: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
